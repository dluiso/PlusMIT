services:
  app:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    env_file: .env
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node-modules:/app/node_modules
      - media:/app/media
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-plusmit}
      POSTGRES_USER: ${POSTGRES_USER:-plusmit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-plusmit-dev-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  node-modules:
  media:
