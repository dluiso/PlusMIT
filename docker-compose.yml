services:
  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    env_file: .env
    environment:
      MEDIA_DIR: /app/media
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - media:/app/media
      - backups:/app/backups
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/public-settings"]
      interval: 30s
      timeout: 10s
      retries: 5

  cli:
    build:
      context: .
      target: cli
    profiles:
      - tools
    env_file: .env
    environment:
      MEDIA_DIR: /app/media
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - media:/app/media
      - backups:/app/backups

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  media:
  backups:
